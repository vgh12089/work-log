<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日誌</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px; /* 防止 iOS 輸入時畫面自動放大 */
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
            min-width: 120px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-backup { background-color: #2ecc71; }
        .btn-backup:hover { background-color: #27ae60; }
        .btn-restore { background-color: #9b59b6; }
        .btn-restore:hover { background-color: #8e44ad; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .weekly-report {
            background-color: #e8f4f8;
            border-left: 5px solid #2980b9;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .report-block {
            background: white;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid #d4e6f1;
        }
        .flex-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media(min-width: 768px) {
            .flex-box { flex-direction: row; }
            .flex-child { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>工作日誌</h1>
    
    <h2>新增今日日誌與預計排程</h2>
    <div class="flex-box">
        <div class="flex-child" style="flex: 0 0 180px;">
            <div class="form-group">
                <label for="logDate">日期</label>
                <input type="date" id="logDate">
            </div>
        </div>
        <div class="flex-child">
            <div class="form-group">
                <label for="logContent">今日工作內容</label>
                <textarea id="logContent" placeholder="請輸入今日工作內容..."></textarea>
            </div>
        </div>
        <div class="flex-child">
            <div class="form-group">
                <label for="scheduleContent">預計排程 / 備忘事項</label>
                <textarea id="scheduleContent" placeholder="請輸入預計排程..."></textarea>
            </div>
        </div>
    </div>
    
    <div class="btn-group">
        <button onclick="saveLog()">儲存資料</button>
        <button onclick="exportBackup()" class="btn-backup">備份資料 (匯出)</button>
        <button onclick="document.getElementById('importFile').click()" class="btn-restore">還原資料 (匯入)</button>
        <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(this)">
    </div>

    <div id="weeklyReportSection" class="weekly-report" style="display: none;">
        <h2>本週工作彙整</h2>
        <div id="weeklyReportContent"></div>
    </div>

    <h2>歷史紀錄查看</h2>
    <div style="overflow-x: auto;">
        <table id="historyTable">
            <thead>
                <tr>
                    <th style="width: 100px;">日期</th>
                    <th style="width: 70px;">星期</th>
                    <th>今日工作</th>
                    <th>預計排程</th>
                    <th style="width: 60px;">操作</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('logDate').value = today;
        loadLogs();
    });

    function getLogs() {
        const logs = localStorage.getItem('workLogsV2');
        return logs ? JSON.parse(logs) : {};
    }

    function saveLog() {
        const dateInput = document.getElementById('logDate').value;
        const contentInput = document.getElementById('logContent').value.trim();
        const scheduleInput = document.getElementById('scheduleContent').value.trim();

        if (!dateInput || (!contentInput && !scheduleInput)) {
            alert('請填寫內容！');
            return;
        }

        const logs = getLogs();
        logs[dateInput] = { content: contentInput, schedule: scheduleInput };
        localStorage.setItem('workLogsV2', JSON.stringify(logs));

        document.getElementById('logContent').value = '';
        document.getElementById('scheduleContent').value = '';
        loadLogs();
        alert('儲存成功！');
    }

    function deleteLog(date) {
        if (confirm(`確定要刪除 ${date} 的紀錄嗎？`)) {
            const logs = getLogs();
            delete logs[date];
            localStorage.setItem('workLogsV2', JSON.stringify(logs));
            loadLogs();
        }
    }

    function loadLogs() {
        const logs = getLogs();
        const historyBody = document.getElementById('historyBody');
        historyBody.innerHTML = '';

        const sortedDates = Object.keys(logs).sort((a, b) => new Date(b) - new Date(a));
        const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        sortedDates.forEach(date => {
            const dateObj = new Date(date);
            const dayName = weekDays[dateObj.getDay()];
            const item = logs[date];
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${date}</td>
                <td>${dayName}</td>
                <td style="white-space: pre-line;">${item.content || '-'}</td>
                <td style="white-space: pre-line; color: #666; font-style: italic;">${item.schedule || '-'}</td>
                <td><button onclick="deleteLog('${date}')" style="background-color: #e74c3c; padding: 5px; font-size: 12px; min-width: auto; width: 100%;">刪</button></td>
            `;
            historyBody.appendChild(row);
        });

        checkWeeklyReport(logs);
    }

    function checkWeeklyReport(logs) {
        const reportSection = document.getElementById('weeklyReportSection');
        const reportContent = document.getElementById('weeklyReportContent');
        const sortedDates = Object.keys(logs).sort((a, b) => new Date(b) - new Date(a));
        
        if (sortedDates.length === 0) { reportSection.style.display = 'none'; return; }

        const latestDateStr = sortedDates[0];
        const latestDate = new Date(latestDateStr);
        
        if (latestDate.getDay() === 5) {
            reportSection.style.display = 'block';
            const currentDay = latestDate.getDay();
            const mondayOffset = currentDay - 1;
            const monday = new Date(latestDate);
            monday.setDate(latestDate.getDate() - mondayOffset);
            
            let htmlResult = `<strong>本週區間：${monday.toISOString().split('T')[0]} ~ ${latestDateStr}</strong><br><br>`;
            let doneTasksHtml = `<h3>一、 本週執行工作內容：</h3><div class="report-block">`;
            let nextTasksHtml = `<h3>二、 後續預計衍生排程：</h3><div class="report-block">`;
            
            const weekDays = ['星期一', '星期二', '星期三', '星期四', '星期五'];
            let hasDoneData = false; let hasNextData = false;

            for(let i = 0; i < 5; i++) {
                const checkDate = new Date(monday);
                checkDate.setDate(monday.getDate() + i);
                const checkDateStr = checkDate.toISOString().split('T')[0];
                
                if (logs[checkDateStr]) {
                    const item = logs[checkDateStr];
                    if(item.content) {
                        hasDoneData = true;
                        doneTasksHtml += `<strong>【${checkDateStr} (${weekDays[i]})】</strong><br><div style="margin-left: 15px; margin-bottom: 10px; white-space: pre-line;">${item.content}</div>`;
                    }
                    if(item.schedule) {
                        hasNextData = true;
                        nextTasksHtml += `<strong>【來自 ${checkDateStr} 的排程】</strong><br><div style="margin-left: 15px; margin-bottom: 10px; white-space: pre-line; color: #555;">${item.schedule}</div>`;
                    }
                }
            }
            doneTasksHtml += `</div>`; nextTasksHtml += `</div>`;
            if (hasDoneData || hasNextData) {
                reportContent.innerHTML = htmlResult + (hasDoneData ? doneTasksHtml : '') + (hasNextData ? nextTasksHtml : '');
            } else { reportSection.style.display = 'none'; }
        } else { reportSection.style.display = 'none'; }
    }

    // 匯出 JSON 備份檔
    function exportBackup() {
        const logs = localStorage.getItem('workLogsV2');
        if (!logs || logs === '{}') { alert('目前沒有資料可以備份！'); return; }
        
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(logs);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `work_log_backup_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // 匯入 JSON 備份檔
    function importBackup(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (typeof importedData === 'object' && importedData !== null) {
                    const currentLogs = getLogs();
                    // 合併新舊資料，若日期重複則以匯入的為主
                    const mergedLogs = { ...currentLogs, ...importedData };
                    localStorage.setItem('workLogsV2', JSON.stringify(mergedLogs));
                    loadLogs();
                    alert('資料匯入並合併成功！');
                } else { alert('檔案格式不正確！'); }
            } catch (err) { alert('讀取檔案失敗，請確保這是正確的備份檔。'); }
        };
        reader.readAsText(file);
        input.value = ''; // 清空 file input
    }
</script>

</body>
</html>
